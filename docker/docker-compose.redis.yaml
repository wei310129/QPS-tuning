name: qps-tuning
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: qps-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    networks:
      - qps-net

networks:
  qps-net:
    driver: bridge
