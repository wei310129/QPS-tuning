name: qps-tuning
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: qps-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    networks:
      - qps-net

  prometheus:
    image: prom/prometheus:latest
    container_name: qps-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qps-net

  tempo:
    image: grafana/tempo:latest
    container_name: qps-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana 查 trace 用)
      - "4317:4317"   # OTLP gRPC (app → Tempo)
      - "4318:4318"   # OTLP HTTP (app → Tempo)
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
    networks:
      - qps-net

  grafana:
    image: grafana/grafana:latest
    container_name: qps-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
      - tempo
    networks:
      - qps-net

networks:
  qps-net:
    driver: bridge

volumes:
  grafana-data:
