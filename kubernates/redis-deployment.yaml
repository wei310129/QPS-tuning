apiVersion: apps/v1
kind: Deployment
metadata:
  name: mps-redis-node-0
  namespace: front-mpos
  labels:
    app: mps-redis-node-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mps-redis-node-0
  template:
    metadata:
      labels:
        app: mps-redis-node-0
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              cat > /home/redis/redis.conf <<EOF
              bind 0.0.0.0
              port 6379
              dir /home/redis/data
              appendonly yes
              protected-mode no
              EOF

              redis-server /home/redis/redis.conf
          ports:
            - containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /home/redis/data
            - name: config
              mountPath: /home/redis
          resources:
            requests:
              cpu: "0.1"
              memory: "128Mi"
            limits:
              cpu: "2"
              memory: "12Gi"
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          emptyDir: {}


