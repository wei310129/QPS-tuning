apiVersion: v1
kind: Service
metadata:
  name: mps-redis-node-0-service
  namespace: front-mpos
  labels:
    app: mps-redis-node-0
spec:
  type: ClusterIP
  selector:
    app: mps-redis-node-0
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379


