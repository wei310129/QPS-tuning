# ─────────────────────────────────────────────
# Redis StatefulSet（目前 3 節點：node-0 為 bootstrap 初始 master，node-1/2 為 replica）
# 每個 Pod 包含 Redis + Sentinel 兩個 container（sidecar 模式）
#
# 每個 Pod 會用穩定的 headless DNS 主機名宣告自己，讓
# Sentinel 不會記錄原始 Pod IP，避免 failover 後重建造成
# 舊 IP 持續累積的問題。
#
# 每次（重）啟時，先由 initContainer 探測目前 master，
# 整理出最終採用的 master（effective master），
# 並預先產生 redis.conf、sentinel.conf。
# 主容器僅負責啟動 Redis/Sentinel，降低 shell 邏輯維護成本。
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mps-redis-ha
  namespace: front-mpos
  labels:
    app: mps-redis-ha
spec:
  serviceName: mps-redis-ha-headless   # 必須與 headless Service 名稱一致
  replicas: 3
  selector:
    matchLabels:
      app: mps-redis-ha
  template:
    metadata:
      labels:
        app: mps-redis-ha
    spec:
      initContainers:
        - name: config-bootstrap
          image: redis:7-alpine
          envFrom:
            - configMapRef:
                name: mps-redis-ha-config
          command:
            - sh
            - -c
            - |
              POD_NAME=$(hostname)
              POD_INDEX=${POD_NAME##*-}
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              REDIS_HEADLESS_SERVICE_FQDN="${REDIS_HEADLESS_SERVICE}.${NAMESPACE}.svc.${CLUSTER_DOMAIN}"
              REDIS_POD_FQDN="${POD_NAME}.${REDIS_HEADLESS_SERVICE_FQDN}"
              DISCOVERED_MASTER_POD_FQDN=""
              EFFECTIVE_MASTER_POD_FQDN=""

              echo "[bootstrap] Pod=${POD_NAME}, POD_INDEX=${POD_INDEX}"

              # 優先詢問其他 Pod 的 Sentinel 目前 master，避免重啟時誤退回固定 node-0。
              # 依 REDIS_REPLICA_COUNT 逐一探測，並直接比對 ordinal 跳過自己。
              i=0
              while [ "$i" -lt "$REDIS_REPLICA_COUNT" ]; do
                if [ "$i" = "$POD_INDEX" ]; then
                  i=$((i + 1))
                  continue
                fi
                SENTINEL_POD_FQDN="${REDIS_POD_BASENAME}-${i}.${REDIS_HEADLESS_SERVICE_FQDN}"
                DISCOVERED_MASTER_POD_FQDN=$(redis-cli -h "$SENTINEL_POD_FQDN" -p "$SENTINEL_PORT" --no-auth-warning \
                  SENTINEL get-master-addr-by-name "$REDIS_MASTER_NAME" 2>/dev/null | head -1)
                if [ -n "$DISCOVERED_MASTER_POD_FQDN" ]; then
                  echo "[bootstrap] Sentinel ${SENTINEL_POD_FQDN}:${SENTINEL_PORT} 回報 master: ${DISCOVERED_MASTER_POD_FQDN}"
                  break
                fi
                i=$((i + 1))
              done

              # 整理最終採用的 master：優先用 Sentinel 查到的結果；
              # 若所有 Sentinel 都不可達，才退回 bootstrap 規則。
              EFFECTIVE_MASTER_POD_FQDN="$DISCOVERED_MASTER_POD_FQDN"
              if [ -z "$EFFECTIVE_MASTER_POD_FQDN" ]; then
                if [ "$POD_INDEX" != "0" ]; then
                  EFFECTIVE_MASTER_POD_FQDN="${REDIS_POD_BASENAME}-0.${REDIS_HEADLESS_SERVICE_FQDN}"
                  echo "[bootstrap] Sentinel 不可達，改用 bootstrap master: ${EFFECTIVE_MASTER_POD_FQDN}"
                else
                  EFFECTIVE_MASTER_POD_FQDN="$REDIS_POD_FQDN"
                  echo "[bootstrap] Sentinel 不可達，且目前為 node-0，自己作為 bootstrap master"
                fi
              fi

              # 產生 Redis 設定
              cat > /home/redis/redis.conf <<EOF
              bind 0.0.0.0
              port ${REDIS_PORT}
              dir /home/redis/data
              appendonly yes
              protected-mode no
              maxmemory 64mb
              maxmemory-policy noeviction
              replica-announce-ip ${REDIS_POD_FQDN}
              replica-announce-port ${REDIS_PORT}
              EOF
              if [ "$EFFECTIVE_MASTER_POD_FQDN" != "$REDIS_POD_FQDN" ]; then
                echo "replicaof ${EFFECTIVE_MASTER_POD_FQDN} ${REDIS_PORT}" >> /home/redis/redis.conf
                echo "[bootstrap] Redis 以 replica 啟動，上游 master: ${EFFECTIVE_MASTER_POD_FQDN}"
              else
                echo "[bootstrap] Redis 以 master 啟動"
              fi

              # 產生 Sentinel 設定（沿用同一個 effective master 決策）
              cat > /home/sentinel/sentinel.conf <<EOF
              port ${SENTINEL_PORT}
              bind 0.0.0.0
              protected-mode no
              dir /home/sentinel/data
              sentinel resolve-hostnames yes
              sentinel announce-hostnames yes
              sentinel announce-ip ${REDIS_POD_FQDN}
              sentinel announce-port ${SENTINEL_PORT}
              sentinel monitor ${REDIS_MASTER_NAME} ${EFFECTIVE_MASTER_POD_FQDN} ${REDIS_PORT} 2
              sentinel down-after-milliseconds ${REDIS_MASTER_NAME} 5000
              sentinel failover-timeout ${REDIS_MASTER_NAME} 30000
              sentinel parallel-syncs ${REDIS_MASTER_NAME} 1
              EOF
              echo "[bootstrap] Sentinel monitor target: ${EFFECTIVE_MASTER_POD_FQDN}:${REDIS_PORT}"
          volumeMounts:
            - name: redis-config
              mountPath: /home/redis
            - name: sentinel-config
              mountPath: /home/sentinel

      containers:

        # ── Redis 主程序 ────────────────────────────────────────────────────
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /home/redis/redis.conf
          ports:
            - containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: redis-data
              mountPath: /home/redis/data
            - name: redis-config
              mountPath: /home/redis
          resources:
            requests:
              cpu: "0.1"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "12Gi"

        # ── Sentinel Sidecar ────────────────────────────────────────────────
        # 與 Redis 同一 Pod，共用 Pod IP 和 headless DNS 名稱，
        # 差別只在 port（26379 vs 6379）。
        # sentinel.conf 已由 initContainer 預先產生；這裡只等待本機 Redis 就緒後啟動 Sentinel。
        # announce-ip 設為本 Pod 的 FQDN，讓其他 Sentinel 和客戶端
        # 透過可解析的名稱找到此 Sentinel，而非不穩定的 Pod IP。
        - name: sentinel
          image: redis:7-alpine
          envFrom:
            - configMapRef:
                name: mps-redis-ha-config
          command:
            - sh
            - -c
            - |
              echo "[sentinel-init] 等待本機 Redis (localhost:${REDIS_PORT}) 就緒..."
              until redis-cli -h localhost -p "$REDIS_PORT" --no-auth-warning PING 2>/dev/null | grep -q PONG; do
                sleep 1
              done
              echo "[sentinel-init] 本機 Redis 就緒"

              exec redis-sentinel /home/sentinel/sentinel.conf
          ports:
            - containerPort: 26379
              protocol: TCP
          volumeMounts:
            - name: sentinel-data
              mountPath: /home/sentinel/data
            - name: sentinel-config
              mountPath: /home/sentinel
          resources:
            requests:
              cpu: "0.1"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "256Mi"

      volumes:
        - name: redis-data
          emptyDir: {}
        - name: redis-config
          emptyDir: {}
        - name: sentinel-data
          emptyDir: {}
        - name: sentinel-config
          emptyDir: {}
