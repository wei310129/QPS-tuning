# ─────────────────────────────────────────────
# Redis StatefulSet（3 節點：node-0 為初始 master，node-1/2 為 replica）
# 每個 Pod 包含 Redis + Sentinel 兩個 container（sidecar 模式）
#
# 每個 Pod 會用穩定的 headless DNS 主機名宣告自己，讓
# Sentinel 不會記錄原始 Pod IP，避免 failover 後重建造成
# 舊 IP 持續累積的問題。
#
# 每次（重）啟時，先由 initContainer 探測/決定 master，
# 並預先產生 redis.conf、sentinel.conf。
# 主容器僅負責啟動 Redis/Sentinel，降低 shell 邏輯維護成本。
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mps-redis
  namespace: front-mpos
  labels:
    app: mps-redis
spec:
  serviceName: mps-redis-headless   # 必須與 headless Service 名稱一致
  replicas: 3
  selector:
    matchLabels:
      app: mps-redis
  template:
    metadata:
      labels:
        app: mps-redis
    spec:
      initContainers:
        - name: config-bootstrap
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              HOSTNAME=$(hostname)
              INDEX=${HOSTNAME##*-}
              REDIS_HEADLESS="mps-redis-headless.front-mpos.svc.cluster.local"
              ANNOUNCE_HOSTNAME="${HOSTNAME}.${REDIS_HEADLESS}"
              MASTER_HOST=""

              echo "[bootstrap] Pod=${HOSTNAME}, INDEX=${INDEX}"

              # 優先詢問其他 Pod 的 Sentinel 目前 master，避免重啟時回退成固定 node-0。
              for i in 0 1 2; do
                if [ "mps-redis-${i}" = "$HOSTNAME" ]; then
                  continue
                fi
                SENTINEL="mps-redis-${i}.${REDIS_HEADLESS}"
                CANDIDATE=$(redis-cli -h "$SENTINEL" -p 26379 --no-auth-warning \
                  SENTINEL get-master-addr-by-name mymaster 2>/dev/null | head -1)
                if [ -n "$CANDIDATE" ]; then
                  MASTER_HOST="$CANDIDATE"
                  echo "[bootstrap] Sentinel ${SENTINEL}:26379 回報 master: ${MASTER_HOST}"
                  break
                fi
              done

              # 若 Sentinel 暫時不可達（冷啟動），退回固定 bootstrap 規則。
              if [ -z "$MASTER_HOST" ] && [ "$INDEX" != "0" ]; then
                MASTER_HOST="mps-redis-0.${REDIS_HEADLESS}"
                echo "[bootstrap] Sentinel 不可達，改用 bootstrap master: ${MASTER_HOST}"
              fi

              # 產生 Redis 設定
              cat > /home/redis/redis.conf << 'EOF'
              bind 0.0.0.0
              port 6379
              dir /home/redis/data
              appendonly yes
              protected-mode no
              maxmemory 64mb
              maxmemory-policy noeviction
              EOF
              echo "replica-announce-ip  ${ANNOUNCE_HOSTNAME}" >> /home/redis/redis.conf
              echo "replica-announce-port 6379"                 >> /home/redis/redis.conf
              if [ -n "$MASTER_HOST" ] && [ "$MASTER_HOST" != "$ANNOUNCE_HOSTNAME" ]; then
                echo "replicaof ${MASTER_HOST} 6379" >> /home/redis/redis.conf
                echo "[bootstrap] Redis 以 replica 啟動，上游 master: ${MASTER_HOST}"
              else
                echo "[bootstrap] Redis 以 master 啟動"
              fi

              # 產生 Sentinel 設定（若本機為 master，直接監控自己）
              SENTINEL_MASTER_HOST="$MASTER_HOST"
              if [ -z "$SENTINEL_MASTER_HOST" ]; then
                SENTINEL_MASTER_HOST="$ANNOUNCE_HOSTNAME"
              fi

              cat > /home/sentinel/sentinel.conf << 'EOF'
              port 26379
              bind 0.0.0.0
              protected-mode no
              dir /home/sentinel/data
              sentinel resolve-hostnames yes
              sentinel announce-hostnames yes
              EOF
              echo "sentinel announce-ip   ${ANNOUNCE_HOSTNAME}" >> /home/sentinel/sentinel.conf
              echo "sentinel announce-port 26379"                 >> /home/sentinel/sentinel.conf
              echo ""                                             >> /home/sentinel/sentinel.conf
              echo "sentinel monitor mymaster ${SENTINEL_MASTER_HOST} 6379 2" >> /home/sentinel/sentinel.conf
              echo "sentinel down-after-milliseconds mymaster 5000"           >> /home/sentinel/sentinel.conf
              echo "sentinel failover-timeout mymaster 30000"                 >> /home/sentinel/sentinel.conf
              echo "sentinel parallel-syncs mymaster 1"                       >> /home/sentinel/sentinel.conf
              echo "[bootstrap] Sentinel monitor target: ${SENTINEL_MASTER_HOST}:6379"
          volumeMounts:
            - name: redis-config
              mountPath: /home/redis
            - name: sentinel-config
              mountPath: /home/sentinel

      containers:

        # ── Redis 主程序 ────────────────────────────────────────────────────
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /home/redis/redis.conf
          ports:
            - containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: redis-data
              mountPath: /home/redis/data
            - name: redis-config
              mountPath: /home/redis
          resources:
            requests:
              cpu: "0.1"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "256Mi"

        # ── Sentinel Sidecar ────────────────────────────────────────────────
        # 與 Redis 同一 Pod，共用 Pod IP 和 headless DNS 名稱，
        # 差別只在 port（26379 vs 6379）。
        # announce-ip 設為本 Pod 的 FQDN，讓其他 Sentinel 和客戶端
        # 透過可解析的名稱找到此 Sentinel，而非不穩定的 Pod IP。
        - name: sentinel
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              echo "[sentinel-init] 等待本機 Redis (localhost:6379) 就緒..."
              until redis-cli -h localhost -p 6379 --no-auth-warning PING 2>/dev/null | grep -q PONG; do
                sleep 1
              done
              echo "[sentinel-init] 本機 Redis 就緒"

              exec redis-sentinel /home/sentinel/sentinel.conf
          ports:
            - containerPort: 26379
              protocol: TCP
          volumeMounts:
            - name: sentinel-data
              mountPath: /home/sentinel/data
            - name: sentinel-config
              mountPath: /home/sentinel
          resources:
            requests:
              cpu: "0.1"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "256Mi"

      volumes:
        - name: redis-data
          emptyDir: {}
        - name: redis-config
          emptyDir: {}
        - name: sentinel-data
          emptyDir: {}
        - name: sentinel-config
          emptyDir: {}
