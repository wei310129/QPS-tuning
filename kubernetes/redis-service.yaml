# ─────────────────────────────────────────────
# Redis StatefulSet 專用 Headless Service
#
# clusterIP: None 代表 Kubernetes 會為每個 Pod 建立 A 紀錄：
#   mps-redis-0.mps-redis-headless.front-mpos.svc.cluster.local
#   mps-redis-1.mps-redis-headless.front-mpos.svc.cluster.local
#   mps-redis-2.mps-redis-headless.front-mpos.svc.cluster.local
#
# Sidecar 架構下，Redis (6379) 和 Sentinel (26379) 同在一個 Pod，
# 因此同時開放兩個 port，讓節點間可透過穩定 FQDN 互相通信。
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mps-redis-headless
  namespace: front-mpos
  labels:
    app: mps-redis
spec:
  clusterIP: None
  selector:
    app: mps-redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
    - name: sentinel
      protocol: TCP
      port: 26379
      targetPort: 26379


---
# ─────────────────────────────────────────────
# 提供應用程式連線 Sentinel 的 ClusterIP Service
#
# App (Redisson) 連到此穩定 VIP；Kubernetes 會把流量分配到
# 3 個 Redis Pod（sidecar 架構下 Sentinel 在同一 Pod）。
# Service 名稱需與 app-configmap.yaml 一致。
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mps-redis-sentinel-service
  namespace: front-mpos
  labels:
    app: mps-redis
spec:
  type: ClusterIP
  selector:
    app: mps-redis
  ports:
    - name: sentinel
      protocol: TCP
      port: 26379
      targetPort: 26379
