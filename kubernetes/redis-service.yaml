# ─────────────────────────────────────────────
# Redis StatefulSet 專用 Headless Service
#
# clusterIP: None 代表 Kubernetes 會為每個 Pod 建立 A 紀錄：
#   mps-redis-0.mps-redis-headless.front-mpos.svc.cluster.local
#   mps-redis-1.mps-redis-headless.front-mpos.svc.cluster.local
#   mps-redis-2.mps-redis-headless.front-mpos.svc.cluster.local
#
# Redis 節點會透過 replica-announce-ip 宣告這些穩定主機名，
# Sentinel 因此不會記住會變動的 Pod IP。
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mps-redis-headless
  namespace: front-mpos
  labels:
    app: mps-redis
spec:
  clusterIP: None
  selector:
    app: mps-redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379


---
# ─────────────────────────────────────────────
# Sentinel StatefulSet 專用 Headless Service
#
# 提供每個 Sentinel Pod 穩定的 DNS，供節點彼此發現：
#   mps-redis-sentinel-0.mps-redis-sentinel-headless.front-mpos.svc.cluster.local
#   mps-redis-sentinel-1.mps-redis-sentinel-headless.front-mpos.svc.cluster.local
#   mps-redis-sentinel-2.mps-redis-sentinel-headless.front-mpos.svc.cluster.local
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mps-redis-sentinel-headless
  namespace: front-mpos
  labels:
    app: mps-redis-sentinel
spec:
  clusterIP: None
  selector:
    app: mps-redis-sentinel
  ports:
    - name: sentinel
      protocol: TCP
      port: 26379
      targetPort: 26379


---
# ─────────────────────────────────────────────
# 提供應用程式連線 Sentinel 的 ClusterIP Service
#
# App (Redisson) 連到此穩定 VIP；Kubernetes 會把流量分配到
# 3 個 Sentinel Pod。Service 名稱需與 app-configmap.yaml 一致。
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mps-redis-sentinel-service
  namespace: front-mpos
  labels:
    app: mps-redis-sentinel
spec:
  type: ClusterIP
  selector:
    app: mps-redis-sentinel
  ports:
    - name: sentinel
      protocol: TCP
      port: 26379
      targetPort: 26379
